name: Build And Push to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  
jobs:
  build_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: FS Scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'
          exit-code: 0

      - name: Build Docker Image
        run: docker build -t 825269749614.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with: 
          image-ref: '825269749614.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest'
          format: 'table'
          exit-code: 0
          ignore-unfixed: true 
          severity: 'CRITICAL,HIGH'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::825269749614:oidc-provider/token.actions.githubusercontent.com
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        run: docker push 825269749614.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest