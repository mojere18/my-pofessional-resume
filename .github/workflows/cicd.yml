name: My first pipeline

on:
   push:
    branches: ["main"]

jobs:
            build:
                runs-on: ubuntu-latest #macos, windows-latest
                steps:
                    - name: Clone the code
                      uses: actions/checkout@v4
                    - name: build image
                      run:
                        docker build -t gotservices/cicd-portfolio .
                    - name: Docker login
                      uses: docker/login-action@v3
                      with:
                        username: gotservices
                        password: ${{ secrets.DOCKER_PASS }}
                    - name: push image
                      run: docker push gotservices/cicd-portfolio                      

                      

            